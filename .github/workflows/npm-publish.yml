name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pkgs/zoomhandler
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org/

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Confirm package identity
        run: |
          test "$(node -p "require('./package.json').name")" = "zoomhandler"
          test "$(node -p "require('./package.json').private || false")" != "true"

      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: List files that would be published
        run: npm pack --dry-run

      - name: Assert tarball paths are only package.json + dist/
        run: |
          set -euo pipefail
          TGZ="/tmp/$(npm pack --pack-destination /tmp --ignore-scripts | tail -1)"
          mapfile -t paths < <(tar tzf "$TGZ")
          for p in "${paths[@]}"; do
            case "$p" in
              package/package.json) ;;
              package/dist|package/dist/*) ;;
              *) echo "unexpected path in tarball: $p"; exit 1 ;;
            esac
          done

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
